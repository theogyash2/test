name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AK }}
          aws-secret-access-key: ${{ secrets.SAK }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to all instances
        run: |
          wait_for_ssm() {
            local CMD_ID=$1
            local INSTANCE_ID=$2
            local MAX_WAIT=600
            local ELAPSED=0
            
            echo "Waiting for SSM command $CMD_ID..."
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              STATUS=$(aws ssm get-command-invocation \
                --instance-id "$INSTANCE_ID" \
                --command-id "$CMD_ID" \
                --query "Status" \
                --output text \
                --region $AWS_REGION 2>/dev/null || echo "Pending")
              
              echo "  Status: $STATUS (${ELAPSED}s elapsed)"

              if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" ]]; then
                break
              fi

              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done

            echo "Final Status: $STATUS"

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ]; then
              echo "--- Output ---"
              aws ssm get-command-invocation \
                --instance-id "$INSTANCE_ID" \
                --command-id "$CMD_ID" \
                --query "StandardOutputContent" \
                --output text \
                --region $AWS_REGION 2>/dev/null || echo "(no output)"
              
              if [ "$STATUS" = "Failed" ]; then
                echo "--- Errors ---"
                aws ssm get-command-invocation \
                  --instance-id "$INSTANCE_ID" \
                  --command-id "$CMD_ID" \
                  --query "StandardErrorContent" \
                  --output text \
                  --region $AWS_REGION 2>/dev/null || echo "(no errors)"
              fi
            fi

            [ "$STATUS" = "Success" ]
          }
            
          INSTANCES=$(cat instances.json | jq -c '.instances[]')

          for instance in $INSTANCES; do
            NAME=$(echo $instance | jq -r '.name')
            ID=$(echo $instance | jq -r '.instance_id')
            IP=$(echo $instance | jq -r '.server_ip')

            echo "=========================================="
            echo "Deploying to $NAME ($IP)"
            echo "=========================================="

            # Check what's missing
            echo "Checking requirements..."
            CHECK_CMD=$(aws ssm send-command \
              --instance-ids "$ID" \
              --document-name "AWS-RunPowerShellScript" \
              --parameters 'commands=["
                $ErrorActionPreference = \"Continue\"
                $missing = @()
                if (!(Test-Path \"C:\\Python313\\python.exe\")) { $missing += \"python\" }
                if (!(Test-Path \"C:\\Program Files\\Git\\bin\\git.exe\")) { $missing += \"git\" }
                if (!(Test-Path \"C:\\production\\.git\")) { $missing += \"repo\" }
                if (!(Test-Path \"C:\\nssm\\nssm.exe\")) { $missing += \"nssm\" }
                if (!(Test-Path \"C:\\nginx\\nginx.exe\")) { $missing += \"nginx\" }
                if (!(Test-Path \"C:\\production\\venv\\Scripts\\python.exe\")) { $missing += \"venv\" }
                if (!(Test-Path \"C:\\production\\database\\ecommerce.db\")) { $missing += \"database\" }
                if (!(Get-Service UnicornMaster -EA SilentlyContinue)) { $missing += \"unicorn-svc\" }
                if (!(Get-Service NginxService -EA SilentlyContinue)) { $missing += \"nginx-svc\" }
                Write-Output ($missing -join \",\")
              "]' \
              --output text --query "Command.CommandId" --region $AWS_REGION)

            wait_for_ssm "$CHECK_CMD" "$ID" || {
              echo "[WARN] Requirements check failed, assuming fresh install"
              MISSING="python,git,repo,nssm,nginx,venv,database,unicorn-svc,nginx-svc"
            }

            MISSING=$(aws ssm get-command-invocation \
              --instance-id "$ID" \
              --command-id "$CHECK_CMD" \
              --query "StandardOutputContent" \
              --output text \
              --region $AWS_REGION 2>/dev/null | tr -d '\n\r ' || echo "python,git,repo,nssm,nginx,venv,database,unicorn-svc,nginx-svc")

            if [ ! -z "$MISSING" ] && [ "$MISSING" != "None" ]; then
              echo "[SETUP] Missing components: $MISSING"
              echo "[SETUP] Running full installation..."

              # Create setup script
              cat > /tmp/setup.ps1 << 'POWERSHELL'

      
              $ErrorActionPreference = "Stop"

Write-Host "[INSTALL] Installing Python..."
if (!(Test-Path "C:\Python313\python.exe")) {
  Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.13.0/python-3.13.0-amd64.exe" -OutFile "C:\python_installer.exe"
  Start-Process "C:\python_installer.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1 TargetDir=C:\Python313" -Wait
  Write-Host "[OK] Python installed"
} else {
  Write-Host "[OK] Python exists"
}

Write-Host "[INSTALL] Installing Git..."
if (!(Test-Path "C:\Program Files\Git\bin\git.exe")) {
  Invoke-WebRequest -Uri "https://github.com/git-for-windows/git/releases/download/v2.47.1.windows.1/Git-2.47.1-64-bit.exe" -OutFile "C:\git_installer.exe"
  Start-Process "C:\git_installer.exe" -ArgumentList "/VERYSILENT /NORESTART /NOCANCEL /SP-" -Wait
  Write-Host "[OK] Git installed"
} else {
  Write-Host "[OK] Git exists"
}

Write-Host "[INSTALL] Cloning repository..."
if (!(Test-Path "C:\production\.git")) {
  & "C:\Program Files\Git\bin\git.exe" clone https://github.com/theogyash2/test.git C:\production
  Write-Host "[OK] Repository cloned"
} else {
  Write-Host "[OK] Repository exists"
}

Write-Host "[INSTALL] Creating virtual environment..."
if (!(Test-Path "C:\production\venv\Scripts\python.exe")) {
  & C:\Python313\python.exe -m venv C:\production\venv
  & C:\production\venv\Scripts\pip.exe install --upgrade pip -q
  & C:\production\venv\Scripts\pip.exe install -r C:\production\requirements.txt -q
  & C:\production\venv\Scripts\pip.exe install --upgrade sqlalchemy flask-sqlalchemy -q
  Write-Host "[OK] Virtual environment created"
} else {
  Write-Host "[OK] Virtual environment exists"
}

Write-Host "[INSTALL] Initializing database..."
if (!(Test-Path "C:\production\database\ecommerce.db")) {
  & C:\production\venv\Scripts\python.exe C:\production\init_database.py
  Write-Host "[OK] Database initialized"
} else {
  Write-Host "[OK] Database exists"
}

Write-Host "[INSTALL] Setting up NSSM..."
if (!(Test-Path "C:\nssm\nssm.exe")) {
  New-Item -ItemType Directory -Path C:\nssm -Force | Out-Null
  Copy-Item C:\production\tools\nssm.exe C:\nssm\nssm.exe -Force
  Write-Host "[OK] NSSM installed"
} else {
  Write-Host "[OK] NSSM exists"
}

Write-Host "[INSTALL] Installing Nginx..."
if (!(Test-Path "C:\nginx\nginx.exe")) {
  Invoke-WebRequest -Uri "http://nginx.org/download/nginx-1.24.0.zip" -OutFile "C:\nginx.zip"
  Expand-Archive C:\nginx.zip -DestinationPath C:\ -Force
  Rename-Item C:\nginx-1.24.0 C:\nginx -Force
  Copy-Item C:\production\nginx.conf C:\nginx\conf\nginx.conf -Force
  Write-Host "[OK] Nginx installed"
} else {
  Write-Host "[OK] Nginx exists"
  Copy-Item C:\production\nginx.conf C:\nginx\conf\nginx.conf -Force
}

Write-Host "[INSTALL] Configuring Windows Firewall..."
$rule = Get-NetFirewallRule -DisplayName "Allow HTTP Port 80" -EA SilentlyContinue
if (!$rule) {
  New-NetFirewallRule -DisplayName "Allow HTTP Port 80" -Direction Inbound -LocalPort 80 -Protocol TCP -Action Allow | Out-Null
  Write-Host "[OK] Firewall configured"
} else {
  Write-Host "[OK] Firewall rule exists"
}

Write-Host "[INSTALL] Installing UnicornMaster service..."
if (!(Get-Service UnicornMaster -EA SilentlyContinue)) {
  & C:\nssm\nssm.exe install UnicornMaster "C:\production\venv\Scripts\python.exe" "C:\production\unicorn_master.py"
  & C:\nssm\nssm.exe set UnicornMaster AppDirectory "C:\production"
  & C:\nssm\nssm.exe set UnicornMaster Start SERVICE_AUTO_START
  & C:\nssm\nssm.exe start UnicornMaster
  Write-Host "[OK] UnicornMaster service installed"
} else {
  Write-Host "[OK] UnicornMaster service exists"
}

Write-Host "[INSTALL] Installing Nginx service..."
if (!(Get-Service NginxService -EA SilentlyContinue)) {
  & C:\nssm\nssm.exe install NginxService "C:\nginx\nginx.exe"
  & C:\nssm\nssm.exe set NginxService AppDirectory "C:\nginx"
  & C:\nssm\nssm.exe set NginxService Start SERVICE_AUTO_START
  & C:\nssm\nssm.exe start NginxService
  Write-Host "[OK] Nginx service installed"
} else {
  Write-Host "[OK] Nginx service exists"
}

Write-Host "[OK] Setup complete - waiting for services to start..."
Start-Sleep 15

$unicorn = Get-Service UnicornMaster
$nginx = Get-Service NginxService
Write-Host "UnicornMaster: $($unicorn.Status)"
Write-Host "NginxService: $($nginx.Status)"
POWERSHELL

              # Send setup script to SSM
              SETUP_SCRIPT=$(cat /tmp/setup.ps1 | jq -Rs .)
              
              SETUP_CMD=$(aws ssm send-command \
                --instance-ids "$ID" \
                --document-name "AWS-RunPowerShellScript" \
                --parameters "{\"commands\":[$SETUP_SCRIPT]}" \
                --timeout-seconds 600 \
                --output text --query "Command.CommandId" --region $AWS_REGION)

              echo "Setup command ID: $SETUP_CMD"
              
              if ! wait_for_ssm "$SETUP_CMD" "$ID"; then
                echo "[FAIL] Setup failed for $NAME"
                exit 1
              fi
              
              echo "[OK] Setup completed successfully"
            else
              echo "[OK] All requirements satisfied"
            fi

            # Always update code and restart services
            echo "[DEPLOY] Updating code and restarting services..."
            
            cat > /tmp/deploy.ps1 << 'POWERSHELL'
$ErrorActionPreference = "Stop"

Write-Host "[DEPLOY] Pulling latest code..."
cd C:\production
& "C:\Program Files\Git\bin\git.exe" pull origin main
if ($LASTEXITCODE -ne 0) { 
  Write-Host "[WARN] Git pull failed, but continuing..."
}

Write-Host "[DEPLOY] Installing dependencies..."
& C:\production\venv\Scripts\pip.exe install -r requirements.txt -q
& C:\production\venv\Scripts\pip.exe install --upgrade sqlalchemy flask-sqlalchemy -q

Write-Host "[DEPLOY] Updating Nginx config..."
Copy-Item C:\production\nginx.conf C:\nginx\conf\nginx.conf -Force

Write-Host "[DEPLOY] Restarting services..."
& C:\nssm\nssm.exe restart UnicornMaster
& C:\nssm\nssm.exe restart NginxService

Write-Host "[DEPLOY] Waiting for services to start..."
Start-Sleep 20

$unicorn = Get-Service UnicornMaster
$nginx = Get-Service NginxService

if ($unicorn.Status -ne "Running") {
  Write-Error "UnicornMaster failed to start: $($unicorn.Status)"
  exit 1
}

if ($nginx.Status -ne "Running") {
  Write-Error "NginxService failed to start: $($nginx.Status)"
  exit 1
}

Write-Host "[OK] Deployment complete"
Write-Host "UnicornMaster: $($unicorn.Status)"
Write-Host "NginxService: $($nginx.Status)"
POWERSHELL

            DEPLOY_SCRIPT=$(cat /tmp/deploy.ps1 | jq -Rs .)
            
            DEPLOY_CMD=$(aws ssm send-command \
              --instance-ids "$ID" \
              --document-name "AWS-RunPowerShellScript" \
              --parameters "{\"commands\":[$DEPLOY_SCRIPT]}" \
              --timeout-seconds 300 \
              --output text \
              --query "Command.CommandId" \
              --region $AWS_REGION)

            echo "Deploy command ID: $DEPLOY_CMD"
            
            if ! wait_for_ssm "$DEPLOY_CMD" "$ID"; then
              echo "[FAIL] Deployment failed for $NAME"
              exit 1
            fi

            echo ""
            echo "[SUCCESS] Deployed to $NAME"
            echo "  API: http://$IP"
            echo "  Products: http://$IP/api/products"
            echo "  Orders: http://$IP/api/orders"
            echo ""
          done

          echo "=========================================="
          echo "[SUCCESS] All deployments completed!"
          echo "=========================================="