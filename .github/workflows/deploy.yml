name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AK }}
          aws-secret-access-key: ${{ secrets.SAK }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to all instances
        run: |
          wait_for_ssm() {
            local CMD_ID=$1
            local INSTANCE_ID=$2
            local MAX_WAIT=600
            local ELAPSED=0
            
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              STATUS=$(aws ssm get-command-invocation --instance-id "$INSTANCE_ID" --command-id "$CMD_ID" --query "Status" --output text --region $AWS_REGION 2>/dev/null || echo "Pending")
              echo "  Status: $STATUS (${ELAPSED}s)"
              [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" ]] && break
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done

            if [ "$STATUS" = "Failed" ]; then
              echo "--- Errors ---"
              aws ssm get-command-invocation --instance-id "$INSTANCE_ID" --command-id "$CMD_ID" --query "StandardErrorContent" --output text --region $AWS_REGION
            fi
            
            [ "$STATUS" = "Success" ]
          }
            
          INSTANCES=$(cat instances.json | jq -c '.instances[]')

          for instance in $INSTANCES; do
            NAME=$(echo $instance | jq -r '.name')
            ID=$(echo $instance | jq -r '.instance_id')
            IP=$(echo $instance | jq -r '.server_ip')

            echo "=========================================="
            echo "Deploying to $NAME ($IP)"
            echo "=========================================="

            CHECK_CMD=$(aws ssm send-command --instance-ids "$ID" --document-name "AWS-RunPowerShellScript" --parameters 'commands=["$m=@();if(!(Test-Path \"C:\\Python313\\python.exe\")){$m+=\"python\"};if(!(Test-Path \"C:\\Program Files\\Git\\bin\\git.exe\")){$m+=\"git\"};if(!(Test-Path \"C:\\production\\.git\")){$m+=\"repo\"};if(!(Test-Path \"C:\\nssm\\nssm.exe\")){$m+=\"nssm\"};if(!(Test-Path \"C:\\nginx\\nginx.exe\")){$m+=\"nginx\"};if(!(Test-Path \"C:\\production\\venv\")){$m+=\"venv\"};if(!(Get-Service UnicornMaster -EA SilentlyContinue)){$m+=\"usvc\"};if(!(Get-Service NginxService -EA SilentlyContinue)){$m+=\"nsvc\"};Write-Output ($m -join \",\")"]' --output text --query "Command.CommandId" --region $AWS_REGION)

            wait_for_ssm "$CHECK_CMD" "$ID" || MISSING="python,git,repo,nssm,nginx,venv,usvc,nsvc"
            
            if [ -z "$MISSING" ]; then
              MISSING=$(aws ssm get-command-invocation --instance-id "$ID" --command-id "$CHECK_CMD" --query "StandardOutputContent" --output text --region $AWS_REGION 2>/dev/null | tr -d '\n\r ')
            fi

            if [ ! -z "$MISSING" ]; then
              echo "[SETUP] Missing: $MISSING"
              
              SETUP_CMD=$(aws ssm send-command \
                --instance-ids "$ID" \
                --document-name "AWS-RunPowerShellScript" \
                --parameters "commands=[\"Write-Host '[INSTALL] Python...'; if(!(Test-Path 'C:\\\\Python313\\\\python.exe')){Invoke-WebRequest -Uri 'https://www.python.org/ftp/python/3.13.0/python-3.13.0-amd64.exe' -OutFile 'C:\\\\python.exe'; Start-Process 'C:\\\\python.exe' -ArgumentList '/quiet InstallAllUsers=1 PrependPath=1 TargetDir=C:\\\\Python313' -Wait}; Write-Host '[INSTALL] Git...'; if(!(Test-Path 'C:\\\\Program Files\\\\Git\\\\bin\\\\git.exe')){Invoke-WebRequest -Uri 'https://github.com/git-for-windows/git/releases/download/v2.47.1.windows.1/Git-2.47.1-64-bit.exe' -OutFile 'C:\\\\git.exe'; Start-Process 'C:\\\\git.exe' -ArgumentList '/VERYSILENT /NORESTART' -Wait}; Write-Host '[INSTALL] Repo...'; if(!(Test-Path 'C:\\\\production\\\\.git')){\& 'C:\\\\Program Files\\\\Git\\\\bin\\\\git.exe' clone https://github.com/theogyash2/test.git C:\\\\production}; Write-Host '[INSTALL] Venv...'; if(!(Test-Path 'C:\\\\production\\\\venv')){\& C:\\\\Python313\\\\python.exe -m venv C:\\\\production\\\\venv; \& C:\\\\production\\\\venv\\\\Scripts\\\\pip.exe install -r C:\\\\production\\\\requirements.txt -q; \& C:\\\\production\\\\venv\\\\Scripts\\\\pip.exe install --upgrade sqlalchemy flask-sqlalchemy -q}; Write-Host '[INSTALL] DB...'; if(!(Test-Path 'C:\\\\production\\\\database\\\\ecommerce.db')){\& C:\\\\production\\\\venv\\\\Scripts\\\\python.exe C:\\\\production\\\\init_database.py}; Write-Host '[INSTALL] NSSM...'; if(!(Test-Path 'C:\\\\nssm\\\\nssm.exe')){New-Item -ItemType Directory -Path C:\\\\nssm -Force | Out-Null; Copy-Item C:\\\\production\\\\tools\\\\nssm.exe C:\\\\nssm\\\\nssm.exe -Force}; Write-Host '[INSTALL] Nginx...'; if(!(Test-Path 'C:\\\\nginx\\\\nginx.exe')){Invoke-WebRequest -Uri 'http://nginx.org/download/nginx-1.24.0.zip' -OutFile 'C:\\\\nginx.zip'; Expand-Archive C:\\\\nginx.zip -DestinationPath C:\\\\ -Force; Rename-Item C:\\\\nginx-1.24.0 C:\\\\nginx -Force}; Copy-Item C:\\\\production\\\\nginx.conf C:\\\\nginx\\\\conf\\\\nginx.conf -Force; Write-Host '[INSTALL] Firewall...'; if(!(Get-NetFirewallRule -DisplayName 'Allow HTTP Port 80' -EA SilentlyContinue)){New-NetFirewallRule -DisplayName 'Allow HTTP Port 80' -Direction Inbound -LocalPort 80 -Protocol TCP -Action Allow | Out-Null}; Write-Host '[INSTALL] Services...'; if(!(Get-Service UnicornMaster -EA SilentlyContinue)){\& C:\\\\nssm\\\\nssm.exe install UnicornMaster 'C:\\\\production\\\\venv\\\\Scripts\\\\python.exe' 'C:\\\\production\\\\unicorn_master.py'; \& C:\\\\nssm\\\\nssm.exe set UnicornMaster AppDirectory 'C:\\\\production'; \& C:\\\\nssm\\\\nssm.exe set UnicornMaster Start SERVICE_AUTO_START; \& C:\\\\nssm\\\\nssm.exe start UnicornMaster}; if(!(Get-Service NginxService -EA SilentlyContinue)){\& C:\\\\nssm\\\\nssm.exe install NginxService 'C:\\\\nginx\\\\nginx.exe'; \& C:\\\\nssm\\\\nssm.exe set NginxService AppDirectory 'C:\\\\nginx'; \& C:\\\\nssm\\\\nssm.exe set NginxService Start SERVICE_AUTO_START; \& C:\\\\nssm\\\\nssm.exe start NginxService}; Write-Host '[OK] Done'; Start-Sleep 15\"]" \
                --timeout-seconds 600 \
                --output text \
                --query "Command.CommandId" \
                --region $AWS_REGION)
              
              echo "Setup command: $SETUP_CMD"
              wait_for_ssm "$SETUP_CMD" "$ID" || exit 1
              echo "[OK] Setup complete"
            else
              echo "[OK] All requirements met"
            fi

            echo "[DEPLOY] Updating code..."
            
            DEPLOY_CMD=$(aws ssm send-command \
              --instance-ids "$ID" \
              --document-name "AWS-RunPowerShellScript" \
              --parameters "commands=[\"cd C:\\\\production; \& 'C:\\\\Program Files\\\\Git\\\\bin\\\\git.exe' pull origin main; \& C:\\\\production\\\\venv\\\\Scripts\\\\pip.exe install -r requirements.txt -q; \& C:\\\\production\\\\venv\\\\Scripts\\\\pip.exe install --upgrade sqlalchemy flask-sqlalchemy -q; Copy-Item nginx.conf C:\\\\nginx\\\\conf\\\\nginx.conf -Force; \& C:\\\\nssm\\\\nssm.exe restart UnicornMaster; \& C:\\\\nssm\\\\nssm.exe restart NginxService; Start-Sleep 20; if((Get-Service UnicornMaster).Status -ne 'Running'){Write-Error 'UnicornMaster failed'; exit 1}; if((Get-Service NginxService).Status -ne 'Running'){Write-Error 'NginxService failed'; exit 1}; Write-Host '[OK] Deployed'\"]" \
              --timeout-seconds 300 \
              --output text \
              --query "Command.CommandId" \
              --region $AWS_REGION)

            echo "Deploy command: $DEPLOY_CMD"
            wait_for_ssm "$DEPLOY_CMD" "$ID" || exit 1

            echo ""
            echo "[SUCCESS] Deployed to $NAME"
            echo "  API: http://$IP"
            echo "  Products: http://$IP/api/products"
            echo ""
          done

          echo "=========================================="
          echo "[SUCCESS] All deployments completed!"
          echo "=========================================="